<h2>集成 · MCP Bridge</h2>
<div class="set-card"><div class="set-grid">
    <div class="field"><span class="field-lbl">启用 MCP bridge</span><span class="switch" data-sw="agent_bridge_enabled" data-on="1"><span class="knob"></span></span></div>
    <div class="field span2"><span class="field-lbl">Bridge URL</span><input class="input mono" data-cfg="agent_bridge_url" value="http://127.0.0.1:17831"></div>
    <div class="field span2"><span class="field-lbl">Bridge Token</span><input class="input mono" data-cfg="agent_bridge_token"></div>
    <div class="field"><span class="field-lbl">轮询间隔 (ms)</span><input class="input" data-cfg="agent_bridge_poll_interval_ms" value="3000"></div>
</div></div>
