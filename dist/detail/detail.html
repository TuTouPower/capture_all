<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record All - Session Detail</title>
  <script type="module" crossorigin src="/assets/detail-CtL46YMu.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/i18n-Cu8tMkAL.js">
  <link rel="stylesheet" crossorigin href="/assets/detail-DBikH68x.css">
</head>
<body>
  <div class="detail-container">
    <!-- Header -->
    <header class="detail-header">
      <h1 data-i18n="sessionDetail">Session Detail</h1>
      <div class="header-actions">
        <button class="btn" id="exportJsonBtn" data-i18n="exportJson">Export JSON</button>
        <button class="btn" id="exportHtmlBtn" data-i18n="exportHtml">Export HTML</button>
      </div>
    </header>

    <!-- Session Overview -->
    <div class="overview-section" id="overview">
      <div class="overview-grid">
        <div class="overview-item">
          <label data-i18n="sessionId">Session ID</label>
          <span id="sessionId">-</span>
        </div>
        <div class="overview-item">
          <label data-i18n="startTime">Start Time</label>
          <span id="startTime">-</span>
        </div>
        <div class="overview-item">
          <label data-i18n="duration">Duration</label>
          <span id="duration">-</span>
        </div>
        <div class="overview-item">
          <label data-i18n="mode">Mode</label>
          <span id="mode">-</span>
        </div>
        <div class="overview-item">
          <label data-i18n="events">Events</label>
          <span id="eventCount">0</span>
        </div>
        <div class="overview-item">
          <label data-i18n="networkRequests">Network Requests</label>
          <span id="requestCount">0</span>
        </div>
        <div class="overview-item">
          <label data-i18n="consoleLogs">Console Logs</label>
          <span id="logCount">0</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="timeline" data-i18n="timeline">Timeline</button>
      <button class="tab-btn" data-tab="network" data-i18n="network">Network</button>
      <button class="tab-btn" data-tab="console" data-i18n="console">Console</button>
      <button class="tab-btn" data-tab="events" data-i18n="events">Events</button>
    </nav>

    <!-- Tab Contents -->
    <div class="tab-content active" id="timeline-tab">
      <div class="filter-bar">
        <select id="timelineFilter">
          <option value="all" data-i18n="allEvents">All Events</option>
          <option value="mouse" data-i18n="mouse">Mouse</option>
          <option value="keyboard" data-i18n="keyboard">Keyboard</option>
          <option value="scroll" data-i18n="scroll">Scroll</option>
          <option value="dom_change" data-i18n="domChanges">DOM Changes</option>
          <option value="navigation" data-i18n="navigation">Navigation</option>
          <option value="page_load" data-i18n="pageLoad">Page Load</option>
          <option value="tab_switch" data-i18n="tabSwitch">Tab Switch</option>
        </select>
        <input type="text" id="timelineSearch" data-i18n-placeholder="searchEvents" placeholder="Search events...">
      </div>
      <div class="timeline-container" id="timelineContainer">
      </div>
      <div class="load-more" id="loadMore" style="display: none;">
        Loading more events...
      </div>
    </div>

    <div class="tab-content" id="network-tab">
      <div class="filter-bar">
        <select id="networkFilter">
          <option value="all" data-i18n="allTypes">All Types</option>
          <option value="xhr">XHR</option>
          <option value="fetch">Fetch</option>
          <option value="document">Document</option>
          <option value="stylesheet">CSS</option>
          <option value="script">JS</option>
          <option value="image">Image</option>
        </select>
        <input type="text" id="networkSearch" data-i18n-placeholder="searchUrls" placeholder="Search URLs...">
      </div>
      <div class="network-container" id="networkContainer">
        <table class="network-table">
          <thead>
            <tr>
              <th data-i18n="method">Method</th>
              <th data-i18n="url">URL</th>
              <th data-i18n="status">Status</th>
              <th data-i18n="type">Type</th>
              <th data-i18n="duration">Duration</th>
            </tr>
          </thead>
          <tbody id="networkBody">
          </tbody>
        </table>
      </div>
    </div>

    <div class="tab-content" id="console-tab">
      <div class="filter-bar">
        <select id="consoleFilter">
          <option value="all" data-i18n="allLevels">All Levels</option>
          <option value="error">Error</option>
          <option value="warn">Warning</option>
          <option value="info">Info</option>
          <option value="log">Log</option>
          <option value="debug">Debug</option>
        </select>
        <input type="text" id="consoleSearch" data-i18n-placeholder="searchLogs" placeholder="Search logs...">
      </div>
      <div class="console-container" id="consoleContainer">
      </div>
    </div>

    <div class="tab-content" id="events-tab">
      <div class="filter-bar">
        <select id="eventsFilter">
          <option value="all" data-i18n="allTypes">All Types</option>
          <option value="mouse" data-i18n="mouse">Mouse</option>
          <option value="keyboard" data-i18n="keyboard">Keyboard</option>
          <option value="scroll" data-i18n="scroll">Scroll</option>
          <option value="dom_change" data-i18n="domChanges">DOM Changes</option>
        </select>
        <input type="text" id="eventsSearch" data-i18n-placeholder="searchEvents" placeholder="Search events...">
      </div>
      <div class="events-container" id="eventsContainer">
      </div>
    </div>
  </div>

</body>
</html>
