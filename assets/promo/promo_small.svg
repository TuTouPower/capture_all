<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" role="img" aria-label="Capture">
  <title>Capture — Small promotional tile</title>
  <defs>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a8cff"/>
      <stop offset="50%" stop-color="#00b4ff"/>
      <stop offset="100%" stop-color="#00e0ff"/>
    </linearGradient>
  </defs>

  <!--
    Centered cluster (group midpoint = 220):
    logo 128px, gap 22, text "Capture" ~ 7*0.58*64 ≈ 232 @ size 64 bold
    total ≈ 128+22+232 = 382 → left = (440-382)/2 = 29
    Use text-anchor start with measured layout via nested group translate.
    Safer: wrap logo+text in a group and center with transform.
  -->
  <g transform="translate(220,140)">
    <!-- content half-width tuned from measured bbox (equal L/R margins) -->
    <g transform="translate(-205,-64)">
      <g transform="scale(1)">
        <path fill="#00c9fd" d="M 121.06,45.46 A 60,60 0 0 0 81.54,6.62 L 78.47,46.13 A 23,23 0 0 1 86.94,65.60 Z"/>
        <path fill="#009af6" d="M 76.47,5.31 A 60,60 0 0 0 23.08,20.12 L 55.76,42.53 A 23,23 0 0 1 76.86,44.93 Z"/>
        <path fill="#0072f0" d="M 19.41,23.85 A 60,60 0 0 0 5.54,77.50 L 41.28,60.40 A 23,23 0 0 1 53.92,43.33 Z"/>
        <path fill="#0078f1" d="M 6.94,82.54 A 60,60 0 0 0 46.46,121.38 L 49.53,81.87 A 23,23 0 0 1 41.06,62.40 Z"/>
        <path fill="#00a7f8" d="M 51.53,122.69 A 60,60 0 0 0 104.92,107.88 L 72.24,85.47 A 23,23 0 0 1 51.14,83.07 Z"/>
        <path fill="#00cffe" d="M 108.59,104.15 A 60,60 0 0 0 122.46,50.50 L 86.72,67.60 A 23,23 0 0 1 74.08,84.67 Z"/>
        <circle cx="64" cy="64" r="22" fill="#000"/>
        <circle cx="74" cy="56" r="5.5" fill="#e60000"/>
      </g>
      <text
        x="152"
        y="84"
        fill="url(#text)"
        font-family="Noto Sans, DejaVu Sans, sans-serif"
        font-size="64"
        font-weight="700"
        dominant-baseline="middle"
      >Capture</text>
    </g>
  </g>
</svg>
